services:
  - type: web
    name: community-project-api
    env: python
buildCommand: pip install -r requirements.txt && python manage.py migrate --no-input && python seed_data.py && python manage.py collectstatic --no-input
startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: community-project-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: True
    autoDeploy: true

databases:
  - name: community-project-db
    plan: free