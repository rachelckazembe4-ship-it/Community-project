services:
  - type: web
    name: community-project-api
    env: python
    buildCommand: cd backend && pip install -r requirements.txt && python manage.py migrate --no-input && python manage.py collectstatic --no-input
    startCommand: cd backend && python -c "from seed_data import create_users, create_reports; create_users(); create_reports()" && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: community-project-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: True
      - key: API_BASE
        value: "https://community-project-abtu.onrender.com/api"
    autoDeploy: true

databases:
  - name: community-project-db
    plan: free